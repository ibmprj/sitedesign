<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — RNT Studio</title>
  <link rel="stylesheet" href="tailwind/main.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    <button class="hamburger" id="menuBtn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <a href="dashboard.html" class="logo">
      <span class="logo-main"><span>RNT</span>Studio</span>
      <span class="logo-sub">GWC</span>
    </a>
  </div>
  <ul class="nav-links" id="navLinks">
    <li><a href="dashboard.html"    class="nav-link">Dashboard</a></li>
    <li><a href="strategies.html"   class="nav-link">Strategies</a></li>
    <li><a href="portfolio.html"    class="nav-link">Portfolio</a></li>
    <li><a href="orders.html"       class="nav-link active">Orders</a></li>
    <li><a href="live-signals.html" class="nav-link">Live signals</a></li>
    <li><a href="#"                 class="nav-link">Market Place</a></li>
  </ul>
  <div class="nav-right">
    <div class="ticker">
      <span class="ticker-label">NIFTY</span>
      <span class="ticker-value">24322.20</span>
      <span class="ticker-change up">+1.36%</span>
    </div>
    <div class="kill-switch">
      <span class="ks-label">Kill Switch</span>
      <label class="toggle">
        <input type="checkbox">
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="user-menu">
      <div class="user-avatar">G</div>
      <div class="user-info">
        <span class="user-id">GPR31</span>
        <span class="user-broker">GWC</span>
      </div>
      <span class="caret">▾</span>
    </div>
  </div>
</nav>

<!-- PAGE -->
<div class="page-wrapper">
  <main class="main-content">

    <div class="orders-tabs">
      <button class="orders-tab active" data-tab="all">All</button>
      <button class="orders-tab" data-tab="executed">Executed</button>
      <button class="orders-tab" data-tab="pending">Pending</button>
      <button class="orders-tab" data-tab="rejected">Rejected</button>
    </div>

    <div class="card" style="background:var(--bg-card);">
      <div class="empty-state" style="padding:80px 24px;">
        <svg width="96" height="96" viewBox="0 0 96 96" fill="none">
          <ellipse cx="48" cy="82" rx="24" ry="5.5" fill="#D4AF37" opacity=".15"/>
          <path d="M20 50 L20 78 Q20 80 22 80 L74 80 Q76 80 76 78 L76 50 Z" fill="rgba(212,175,55,0.1)"/>
          <path d="M20 50 L76 50 L76 78 Q76 80 74 80 L22 80 Q20 80 20 78 Z" fill="rgba(212,175,55,0.08)"/>
          <rect x="38" y="50" width="20" height="30" fill="rgba(212,175,55,0.12)" opacity=".5"/>
          <path d="M20 50 L48 41 L48 50 Z" fill="rgba(212,175,55,0.2)"/>
          <path d="M76 50 L48 41 L48 50 Z" fill="rgba(212,175,55,0.15)"/>
          <path d="M20 50 L32 45 L48 50" fill="rgba(212,175,55,0.1)" opacity=".7"/>
          <path d="M76 50 L64 45 L48 50" fill="rgba(212,175,55,0.1)" opacity=".7"/>
          <line x1="41" y1="38" x2="36" y2="22" stroke="rgba(212,175,55,0.4)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="48" y1="36" x2="48" y2="19" stroke="rgba(212,175,55,0.4)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="55" y1="38" x2="60" y2="22" stroke="rgba(212,175,55,0.4)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="48" y1="50" x2="48" y2="80" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>
        </svg>
        <p class="empty-title" id="emptyMsg">No All orders found!</p>
      </div>
    </div>

  </main>
</div>

<button class="chat-fab" title="Support">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<script>
  document.getElementById('menuBtn')?.addEventListener('click', () =>
    document.getElementById('navLinks').classList.toggle('open'));

  const msgs = { all:'No All orders found!', executed:'No Executed orders found!', pending:'No Pending orders found!', rejected:'No Rejected orders found!' };
  document.querySelectorAll('.orders-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.orders-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('emptyMsg').textContent = msgs[this.dataset.tab] || 'No orders found!';
    });
  });
</script>
</body>
</html>
