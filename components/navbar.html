      <span class="logo-main"><span>RNT</span>Studio</span>
      <span class="logo-sub">GWC</span>
    </a>
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="dashboard.html"    class="nav-link [[${activePage == 'dashboard' ? 'active' : ''}]]">Dashboard</a></li>
    <li><a href="strategies.html"   class="nav-link [[${activePage == 'strategies' ? 'active' : ''}]]">Strategies</a></li>
