<!-- SIDEBAR COMPONENT -->
<!-- Usage: Include this in pages that have a right sidebar -->
<!-- Parameters: pnlValue (string), pnlClass (''|'pos'|'neg'), showEmpty (boolean) -->

<aside class="right-sidebar">
  <!-- Net P&L -->
  <div class="sgc">
    <div class="sgc-label">Net P&amp;L</div>
    <div class="sgc-sub">Overall profit of all the strategies</div>
    <div class="sgc-value [[${pnlClass}]]">[[${pnlValue}]]</div>
  </div>

  <!-- Time Preference -->
  <div class="sgc">
    <div class="sgc-label">Time preference</div>
    <div class="sgc-sub">Choose the preferred time.</div>
    <div class="sgc-time-row">
      <span class="sgc-time">9:15 AM - 3:10 PM</span>
      <button class="sgc-edit" title="Edit">✏</button>
    </div>
  </div>

  <!-- Empty State (shown when no open positions) -->
  [[${showEmpty ? '
  <div class="sb-empty">
    <svg width="88" height="88" viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">

      <path d="M18 46 L44 38 L44 46 Z" fill="rgba(212,175,55,0.2)"/>
      <path d="M68 46 L44 38 L44 46 Z" fill="rgba(212,175,55,0.15)"/>
      <path d="M18 46 L30 41 L44 46" fill="rgba(212,175,55,0.1)" opacity=".7"/>
      <path d="M68 46 L56 41 L44 46" fill="rgba(212,175,55,0.1)" opacity=".7"/>
      <line x1="38" y1="35" x2="34" y2="20" stroke="rgba(212,175,55,0.4)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="44" y1="33" x2="44" y2="17" stroke="rgba(212,175,55,0.4)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="50" y1="35" x2="54" y2="20" stroke="rgba(212,175,55,0.4)" stroke-width="2.5" stroke-linecap="round"/>

</aside>
