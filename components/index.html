<!-- ELITE DARK — COMPONENT LIBRARY INDEX -->
<!-- ========================================================
     This folder contains reusable UI components for the
     Elite Dark trading platform theme.

     USAGE:
     Copy component markup into your HTML pages.
     The main.css file in /tailwind contains all component styles.

     COMPONENTS:
     - navbar.html    : Top navigation bar
     - sidebar.html   : Right sidebar with P&L and empty state
     - buttons.html   : All button variants
     - badges.html    : Badge and tag components
     - cards.html     : Card components (section, content, strategy, dashboard)
     - tabs.html      : Tab and filter pill components
     - tables.html    : Data tables and signal grids
     - modals.html    : Subscribe/unsubscribe modals
     - forms.html     : Form inputs, selects, toggles
     ======================================================== -->
