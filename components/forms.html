<!-- FORM COMPONENTS -->

<!-- Text Input -->
<div class="form-group">
  <label class="form-label">Label</label>
  <input type="text" class="form-input" placeholder="Enter value">
</div>

<!-- Select -->
<div class="form-group">
  <label class="form-label">Lot size</label>
  <select class="form-select">
    <option>1 Lot &nbsp;&nbsp; REQ Margin ₹310000</option>
    <option>2 Lots &nbsp;&nbsp; REQ Margin ₹620000</option>
  </select>
</div>

<!-- Date Range Button -->
<div class="form-group">
  <label class="form-label">Date range</label>
  <button class="date-range-btn">
    <span>Jul 2 2025 - Apr 29 2026</span>
    <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<!-- Checkbox -->
<div class="check-row">
  <input type="checkbox" class="check-input" id="termsCheck" checked>
  <label for="termsCheck" class="check-label">
    I have read and agreed to <a href="#">Terms and Conditions</a>
  </label>
</div>

<!-- Toggle (Kill Switch style) -->
<label class="toggle">
  <input type="checkbox">
  <span class="toggle-track"></span>
</label>

<!-- Inline Toggle with Label -->
<div class="charges-toggle">
  <label class="toggle" style="width:28px;height:16px;">
    <input type="checkbox">
    <span class="toggle-track"></span>
  </label>
  Include charges
</div>
